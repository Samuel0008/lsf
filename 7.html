<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>

        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [{"q":"Anatomically, how is the arm defined?","options":["The region of the upper limb between the neck and the wrist","The region of the upper limb between the shoulder and the elbow","The entire upper extremity from the shoulder to the fingertips","The region between the elbow and the wrist joints"],"answer":1},{"q":"What structure envelops the arm and projects inward to divide it into compartments?","options":["Brachial fascia","Antebrachial fascia","Clavipectoral fascia","Pectoral fascia"],"answer":0},{"q":"Which of the following muscles is a content of the anterior compartment of the arm?","options":["Triceps brachii","Anconeus","Coracobrachialis","Brachioradialis"],"answer":2},{"q":"Where does the short head of the biceps brachii originate?","options":["Supraglenoid tubercle of the scapula","Tip of the coracoid process","Infraglenoid tubercle of the scapula","Glenoid labrum"],"answer":1},{"q":"What fascial extension is given off by the long head tendon of the biceps brachii?","options":["Clavipectoral fascia","Brachial aponeurosis","Bicipital aponeurosis","Palmar aponeurosis"],"answer":2},{"q":"Describe the dual nerve supply of the brachialis muscle.","options":["Musculocutaneous nerve (motor) and radial nerve (proprioceptive)","Median nerve (motor) and musculocutaneous nerve (proprioceptive)","Radial nerve (motor) and ulnar nerve (proprioceptive)","Ulnar nerve (motor) and median nerve (proprioceptive)"],"answer":0},{"q":"In humans, what important structure is enclosed between the fused upper heads of the coracobrachialis?","options":["Median nerve","Brachial artery","Musculocutaneous nerve","Radial nerve"],"answer":2},{"q":"The ligament of Struthers sometimes represents which suppressed structure in humans?","options":["The long head of the biceps brachii","The lower head of the coracobrachialis","The medial head of the triceps brachii","The anconeus muscle"],"answer":1},{"q":"What clinical complication can arise from the presence of the ligament of Struthers?","options":["Ulnar nerve palsy","Compression of the radial nerve causing wrist drop","Compression of the median nerve or brachial artery","Rupture of the biceps brachii tendon"],"answer":2},{"q":"At the level of the insertion of the coracobrachialis, how does the shape of the humerus shaft change?","options":["It becomes circular from triangular","It becomes triangular from circular","It flattens anteroposteriorly","It becomes completely rectangular"],"answer":1},{"q":"Which two muscles originate at the same anatomical level as the insertion of the coracobrachialis?","options":["Biceps brachii and brachioradialis","Deltoid and triceps brachii (lateral head)","Brachialis and triceps brachii (medial head)","Coracobrachialis and anconeus"],"answer":2},{"q":"Into which two branches does the profunda brachii artery divide?","options":["Superior and inferior ulnar collateral arteries","Anterior descending (radial collateral) and posterior descending (middle collateral) branches","Anterior and posterior circumflex humeral arteries","Radial and ulnar arteries"],"answer":1},{"q":"From lateral to medial, how does the median nerve cross the brachial artery?","options":["It crosses posterior to the brachial artery","It crosses from the medial to the lateral side","It crosses from the lateral to the medial side","It does not cross the brachial artery"],"answer":2},{"q":"Which artery branch accompanies the radial nerve as it pierces the lateral inter-muscular septum?","options":["Superior ulnar collateral artery","Posterior descending branch of the profunda brachii artery","Anterior descending (radial collateral) branch of the profunda brachii artery","Inferior ulnar collateral artery"],"answer":2},{"q":"The tendon of the long head of the biceps brachii lies within which structure?","options":["The capsule of the elbow joint","The capsule of the shoulder joint","The bicipital aponeurosis","The spiral groove"],"answer":1},{"q":"From which cord of the brachial plexus does the musculocutaneous nerve arise?","options":["Medial cord","Posterior cord","Lateral cord","Anterior cord"],"answer":2},{"q":"How does the musculocutaneous nerve typically leave the axilla and enter the front of the arm?","options":["By passing through the quadrangular space","By piercing the coracobrachialis muscle","By running in the spiral groove","By passing anterior to the pectoralis minor"],"answer":1},{"q":"The musculocutaneous nerve provides articular branches to the elbow joint through branches to which muscle?","options":["Biceps brachii","Coracobrachialis","Brachioradialis","Brachialis"],"answer":3},{"q":"What does the musculocutaneous nerve continue as below the arm?","options":["Medial cutaneous nerve of the forearm","Lateral cutaneous nerve of the forearm","Superficial branch of the radial nerve","Posterior cutaneous nerve of the forearm"],"answer":1},{"q":"With which of the following nerves does the lateral cutaneous nerve of the forearm communicate?","options":["Superficial branch of the radial nerve","Deep branch of the ulnar nerve","Anterior interosseous nerve","Medial cutaneous nerve of the arm"],"answer":0},{"q":"What anatomical variation can occasionally occur with the musculocutaneous nerve?","options":["It may pierce the biceps brachii instead of the coracobrachialis","It may pass behind the coracobrachialis to reach the interval between the biceps and brachialis","It may arise entirely from the medial cord","It may supply the triceps brachii muscle"],"answer":1},{"q":"What is the exact origin of the long head of the triceps muscle?","options":["Supraglenoid tubercle of the scapula","Coracoid process","Infraglenoid tubercle of the scapula","Upper half of the posterior surface of the humerus"],"answer":2},{"q":"Where does the triceps muscle insert?","options":["Radial tuberosity","Coronoid process of the ulna","Upper surface of the olecranon process of the ulna","Styloid process of the radius"],"answer":2},{"q":"From where does the radial nerve originate?","options":["Lateral cord of the brachial plexus","Medial cord of the brachial plexus","Posterior cord of the brachial plexus","Anterior divisions of the middle and lower trunks"],"answer":2},{"q":"What structures accompany the radial nerve in the spiral groove?","options":["Brachial vessels","Profunda brachii vessels","Superior ulnar collateral vessels","Cephalic vein"],"answer":1},{"q":"While in the axilla, the radial nerve gives off muscular branches to which heads of the triceps?","options":["Lateral and medial heads","Long and medial heads","Long and lateral heads","Only the long head"],"answer":1},{"q":"In the anterior compartment of the arm, the radial nerve gives off muscular branches to which of the following muscles?","options":["Biceps brachii and coracobrachialis","Brachialis, brachioradialis, and extensor carpi radialis longus","Flexor carpi ulnaris and pronator teres","Triceps brachii and anconeus"],"answer":1},{"q":"After piercing the medial fascial septum, which muscle covers the ulnar nerve posteriorly?","options":["Brachialis","Lateral head of the triceps","Medial head of the triceps","Coracobrachialis"],"answer":2},{"q":"At the elbow, where exactly does the ulnar nerve lie?","options":["Anterior to the lateral epicondyle of the humerus","Behind the medial epicondyle of the humerus","Within the cubital fossa","Deep to the bicipital aponeurosis"],"answer":1},{"q":"Which arteries provide the blood supply to the posterior compartment of the arm?","options":["Brachial and radial arteries","Anterior and posterior circumflex humeral arteries","Profunda brachii and ulnar collateral arteries","Suprascapular and subscapular arteries"],"answer":2}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;

        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }

        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
