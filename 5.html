<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>

        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [{"q":"What is the primary role of the numerous muscles in the shoulder region?","options":["To rigidly lock the clavicle and scapula together","To stabilize the three joints of the shoulder while giving it motion","To protect the brachial plexus from anterior trauma","To articulate directly with the sternum"],"answer":1},{"q":"Which bone extends across the front of the shoulder from the sternum to the scapula to help stabilize the shoulder's movements?","options":["Humerus","Acromion","Clavicle","Coracoid process"],"answer":2},{"q":"How does the humerus anatomically form a joint with the scapula?","options":["The medial epicondyle meets the acromion","A flat facet articulates with the clavicle","A hinge mechanism connects to the coracoid process","The head of the bone has a ball-like knob to create a ball-and-socket joint"],"answer":3},{"q":"Which of the following is NOT considered one of the six primary muscles of the shoulder region according to the text?","options":["Supraspinatus","Subscapularis","Pectoralis minor","Teres major"],"answer":2},{"q":"What are the origin points of the deltoid muscle?","options":["Medial 1/3 of the clavicle, sternum, and first rib","Lateral 1/3 of the clavicle, acromion, and spine of the scapula","Coracoid process and supraglenoid tubercle","Infraspinous fossa and lateral border of the scapula"],"answer":1},{"q":"Which specific nerve supplies the deltoid muscle?","options":["Musculocutaneous nerve","Radial nerve","Axillary nerve","Suprascapular nerve"],"answer":2},{"q":"What are the distinct actions of the anterior fibers of the deltoid muscle?","options":["Flexion and medial rotation of the humerus","Extension and lateral rotation of the humerus","Abduction of the humerus from 15 to 90 degrees","Adduction and extension of the humerus"],"answer":0},{"q":"Where do both the supraspinatus and infraspinatus muscles insert?","options":["Deltoid tuberosity of the humerus","Lesser tuberosity of the humerus","Greater tuberosity of the humerus","Bicipital groove of the humerus"],"answer":2},{"q":"Which nerve is responsible for supplying both the supraspinatus and infraspinatus muscles?","options":["Axillary nerve","Upper subscapular nerve","Lower subscapular nerve","Suprascapular nerve"],"answer":3},{"q":"Which muscle is specifically responsible for controlling abduction of the humerus from 0 to 15 degrees?","options":["Middle fibers of the deltoid","Supraspinatus","Infraspinatus","Teres minor"],"answer":1},{"q":"What is the insertion point of the subscapularis muscle?","options":["Lesser tuberosity of the humerus","Greater tuberosity of the humerus","Bicipital groove","Lateral border of the scapula"],"answer":0},{"q":"What is the primary action of the subscapularis muscle on the humerus?","options":["Lateral rotation","Abduction","Medial rotation","Extension"],"answer":2},{"q":"What is the origin point of the teres major muscle?","options":["Infraspinous fossa","Medial border of the scapula","Lateral border of the scapula","Spine of the scapula"],"answer":2},{"q":"Which of the following lists the correct actions of the teres major muscle?","options":["Flexion, abduction, and lateral rotation","Extension, adduction, and medial rotation","Abduction, adduction, and flexion","Extension, lateral rotation, and abduction"],"answer":1},{"q":"Which nerve supplies the teres minor muscle?","options":["Suprascapular nerve","Lower subscapular nerve","Axillary nerve","Radial nerve"],"answer":2},{"q":"What is the primary action of the teres minor muscle?","options":["Medial rotation of the humerus","Lateral rotation of the humerus","Adduction of the humerus","Flexion of the humerus"],"answer":1},{"q":"What covers the articulating surfaces of the glenohumeral joint?","options":["Fibrocartilage","Elastic cartilage","Hyaline cartilage","Dense regular connective tissue"],"answer":2},{"q":"How does the body compensate for the disproportion between the large humerus head and the shallow glenoid fossa?","options":["By utilizing the acromioclavicular ligament to pull the head inward","By deepening the glenoid fossa with a fibrocartilage rim called the glenoid labrum","By increasing the thickness of the articular hyaline cartilage","By fusing the clavicle directly to the humerus"],"answer":1},{"q":"Which joint forms the highest point of the shoulder and provides the ability to raise the arm above the head?","options":["Sternoclavicular joint","Glenohumeral joint","Acromioclavicular (AC) joint","Scapulothoracic joint"],"answer":2},{"q":"What is the anatomical classification of the glenohumeral joint?","options":["Fibrous, synarthrotic joint","Cartilaginous, amphiarthrotic symphysis","Synovial, uniaxial hinge joint","Synovial, multiaxial, ball and socket joint"],"answer":3},{"q":"Which of the following muscles is NOT a component of the rotator cuff?","options":["Supraspinatus","Infraspinatus","Teres major","Subscapularis"],"answer":2},{"q":"In which direction is the rotator cuff physically deficient, creating a site of potential weakness in the shoulder joint?","options":["Superiorly","Inferiorly","Anteriorly","Posteriorly"],"answer":1},{"q":"Which muscle forms the anterior anatomical relation to the shoulder joint?","options":["Infraspinatus","Supraspinatus","Subscapularis","Teres minor"],"answer":2},{"q":"Which structure forms the inferior relation to the shoulder joint?","options":["Radial nerve","Axillary nerve","Brachial artery","Long head of the triceps"],"answer":1},{"q":"Which of the following muscles are responsible for shoulder flexion?","options":["Anterior fibers of the deltoid, pectoralis major, coracobrachialis, and short head of biceps brachii","Posterior fibers of the deltoid, latissimus dorsi, and teres major","Supraspinatus, middle fibers of the deltoid, and trapezius","Pectoralis major, latissimus dorsi, and teres major"],"answer":0},{"q":"Which of the following groups of muscles is responsible for shoulder extension?","options":["Anterior fibers of the deltoid, pectoralis major, and coracobrachialis","Posterior fibers of the deltoid, latissimus dorsi, and teres major","Supraspinatus and infraspinatus","Subscapularis and teres minor"],"answer":1},{"q":"Which muscles act to perform shoulder abduction from 15 to 90 degrees?","options":["Supraspinatus","Anterior fibers of the deltoid","Middle fibers of the deltoid","Posterior fibers of the deltoid"],"answer":2},{"q":"Which muscles are primarily responsible for shoulder adduction?","options":["Pectoralis major, latissimus dorsi, and teres major","Supraspinatus, middle deltoid, and trapezius","Anterior deltoid, coracobrachialis, and biceps brachii","Infraspinatus, teres minor, and posterior deltoid"],"answer":0},{"q":"Where is the sternoclavicular joint located, and what is its function?","options":["At the lateral tip of the shoulder; allows the arm to raise","At the center of the chest where the clavicle meets the sternum; allows the clavicles to move","At the posterior scapula; allows retraction of the shoulder blade","At the greater tuberosity; allows attachment of the rotator cuff"],"answer":1},{"q":"How does the rotator cuff primarily contribute to the overall stability of the shoulder joint?","options":["By ossifying into a bony shield during adulthood","By permanently locking the humerus in the glenoid cavity","The tone of these muscles helps in stabilizing the shoulder joint","By secreting synovial fluid to create a vacuum seal"],"answer":2}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;

        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }

        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
