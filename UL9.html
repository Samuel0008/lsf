<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>

        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [{"q":"Which nerve supplies the muscles of the anterior flexor compartment of the forearm, excluding the flexor carpi ulnaris and the medial half of the flexor digitorum profundus?","options":["Ulnar nerve","Radial nerve","Median nerve","Musculocutaneous nerve"],"answer":2},{"q":"What is the common site of origin for all five superficial muscles of the anterior forearm?","options":["Lateral epicondyle of the humerus","Medial epicondyle of the humerus","Coronoid process of the ulna","Olecranon process"],"answer":1},{"q":"Which muscle is the only superficial forearm muscle responsible for pronation rather than flexion of the hand?","options":["Palmaris longus","Flexor carpi radialis","Pronator teres","Flexor digitorum superficialis"],"answer":2},{"q":"Between which two structures does the median nerve pass as it enters the forearm?","options":["The two heads of the pronator teres","The two heads of the flexor carpi ulnaris","The biceps tendon and the brachialis","The brachioradialis and the radial artery"],"answer":0},{"q":"What is the specific insertion point of the flexor carpi radialis (FCR)?","options":["Pisiform bone","2nd and 3rd metacarpal bones","Palmar aponeurosis","Distal phalanx of the thumb"],"answer":1},{"q":"Which muscle inserts into the middle phalanges of the medial four fingers?","options":["Flexor digitorum profundus","Flexor digitorum superficialis","Flexor pollicis longus","Palmaris longus"],"answer":1},{"q":"What is the nerve supply for the lateral half of the flexor digitorum profundus?","options":["Ulnar nerve","Posterior interosseous nerve","Anterior interosseous nerve (from median nerve)","Radial nerve"],"answer":2},{"q":"Which muscle is considered the \"main pronator\" of the forearm and is located in the deep layer?","options":["Pronator teres","Brachioradialis","Pronator quadratus","Supinator"],"answer":2},{"q":"At the wrist, the radial artery is located in which anatomical position?","options":["Medial to the flexor carpi ulnaris tendon","Lateral to the flexor carpi radialis tendon","Deep to the flexor digitorum profundus","Anterior to the palmaris longus"],"answer":1},{"q":"Which muscle slightly overlaps the radial artery in the forearm, though the artery remains otherwise superficial?","options":["Flexor carpi radialis","Pronator teres","Brachioradialis","Extensor carpi radialis longus"],"answer":2},{"q":"What percentage of limbs typically lack the palmaris longus muscle?","options":["5%","14%","25%","40%"],"answer":1},{"q":"Where does the ulnar artery join the ulnar nerve in the forearm?","options":["At the cubital fossa","At the medial border of the flexor digitorum superficialis","Posterior to the medial epicondyle","Within the carpal tunnel"],"answer":1},{"q":"The ulnar nerve enters the forearm by passing:","options":["Through the carpal tunnel","Between the heads of the pronator teres","Posterior to the medial epicondyle","Deep to the brachioradialis"],"answer":2},{"q":"Which nerve supplies the skin of the palmar aspect of the radial 3½ digits and their nail beds?","options":["Ulnar nerve","Median nerve","Radial nerve","Medial cutaneous nerve of forearm"],"answer":1},{"q":"What are the spinal nerve root values for the medial cutaneous nerve of the forearm?","options":["C5, C6","C6, C7","C8, T1","T2, T3"],"answer":2},{"q":"Which muscles act as the primary supinators at the elbow and forearm?","options":["Pronator teres and Pronator quadratus","Biceps brachii and Supinator","Brachialis and Brachioradialis","Flexor carpi ulnaris and Flexor carpi radialis"],"answer":1},{"q":"The deep branch of the radial nerve continues as which nerve after piercing the supinator muscle?","options":["Anterior interosseous nerve","Posterior interosseous nerve","Ulnar nerve","Superficial radial nerve"],"answer":1},{"q":"A patient is unable to extend their thumb and the MCP joints of their digits, but has no sensory loss. Which nerve is likely severed?","options":["Median nerve at the wrist","Deep branch of the radial nerve","Ulnar nerve at the elbow","Musculocutaneous nerve"],"answer":1},{"q":"Which structure does the biceps brachii attach to in order to perform supination?","options":["Coronoid process of the ulna","Medial aspect of the radius (radial tuberosity)","Olecranon of the ulna","Lateral epicondyle"],"answer":1},{"q":"Where do the anterior interosseous nerve and artery lie in the deep forearm?","options":["On the surface of the brachioradialis","On the interosseous membrane","Deep to the pronator quadratus","Between the two heads of the flexor carpi ulnaris"],"answer":1},{"q":"What is the most common site for a lesion of the median nerve?","options":["The cubital fossa","The carpal tunnel","The axilla","Posterior to the medial epicondyle"],"answer":1},{"q":"Why does the central palm remain sensitive in carpal tunnel syndrome?","options":["It is supplied by the ulnar nerve","The palmar cutaneous branch of the median nerve does not traverse the carpal tunnel","It is supplied by the radial nerve","The median nerve is not compressed at the wrist"],"answer":1},{"q":"A \"perforating wound\" at the elbow that injures the median nerve would result in the loss of flexion of which digits?","options":["1st digit only (thumb)","2nd and 3rd digits","4th and 5th digits","All five digits"],"answer":1},{"q":"To form the deep palmar arch, the radial artery joins the deep branch of which artery?","options":["Brachial artery","Common interosseous artery","Ulnar artery","Anterior interosseous artery"],"answer":2},{"q":"Which artery is the larger terminal division of the brachial artery?","options":["Radial artery","Ulnar artery","Common interosseous artery","Profunda brachii"],"answer":1},{"q":"The radial recurrent artery anastomoses with which specific artery?","options":["Superior ulnar collateral","Radial collateral artery","Middle collateral artery","Posterior interosseous"],"answer":1},{"q":"Where do the anterior and posterior ulnar recurrent arteries originate?","options":["Brachial artery","Radial artery","Ulnar artery","Anterior interosseous artery"],"answer":2},{"q":"The common interosseous artery is a branch of which vessel?","options":["Radial artery","Ulnar artery","Brachial artery","Axillary artery"],"answer":1},{"q":"Which artery serves as the primary artery of the extensor compartment of the forearm?","options":["Anterior interosseous artery","Radial artery","Posterior interosseous artery","Ulnar artery"],"answer":2},{"q":"The interosseous recurrent artery courses proximally to anastomose with which artery?","options":["Radial collateral artery","Middle collateral artery","Superior ulnar collateral","Inferior ulnar collateral"],"answer":1}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;

        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }

        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
