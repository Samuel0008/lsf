<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>

        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [{"q":"The brachial plexus is primarily formed by the anterior (ventral) rami of which spinal nerves?","options":["C4, C5, C6, C7, and C8","C5, C6, C7, C8, and T1","C6, C7, C8, T1, and T2","C3, C4, C5, C6, and C7"],"answer":1},{"q":"Which of the following spinal nerves provide a small contribution to the brachial plexus outside of the primary C5-T1 roots?","options":["C3 and T1","C4 and T2","C3 and T3","C4 and T3"],"answer":1},{"q":"Anatomically, where are the divisions of the brachial plexus located?","options":["In the neck","In the axilla","Behind the clavicle","Deep to the scalenus anterior muscle"],"answer":2},{"q":"Where are the cords of the brachial plexus located?","options":["In the neck","Behind the clavicle","In the axilla","In the anterior mediastinum"],"answer":2},{"q":"The roots of the brachial plexus are located in the neck deep to which specific muscle?","options":["Scalenus medius","Scalenus posterior","Sternocleidomastoid","Scalenus anterior"],"answer":3},{"q":"How is the upper trunk of the brachial plexus formed?","options":["By the C7 root alone","By the joining of C5 and C6 roots","By the joining of C8 and T1 roots","By the anterior divisions of the upper and middle trunks"],"answer":1},{"q":"Which root or roots form the middle trunk of the brachial plexus?","options":["C5 and C6","C7 alone","C8 and T1","C6 and C7"],"answer":1},{"q":"How is the lateral cord of the brachial plexus formed?","options":["The anterior divisions of the upper and middle trunks unite to form it","The posterior divisions of all three trunks unite to form it","The anterior division of the lower trunk continues to form it","The C8 and T1 roots join directly to form it"],"answer":0},{"q":"The posterior cord of the brachial plexus is formed by the union of which structures?","options":["Anterior divisions of the upper and middle trunks","Posterior divisions of the three trunks","Anterior division of the lower trunk","C5, C6, and C7 roots directly"],"answer":1},{"q":"Which of the following nerves arises directly from the roots of the brachial plexus?","options":["Suprascapular nerve","Nerve to subclavius","Long thoracic nerve","Lateral pectoral nerve"],"answer":2},{"q":"What is the root origin of the Dorsal scapular nerve?","options":["C5","C6 and C7","C5, C6, and C7","C8 and T1"],"answer":0},{"q":"The roots of the brachial plexus provide a contribution to which of the following nerves?","options":["Vagus nerve","Phrenic nerve","Accessory nerve","Hypoglossal nerve"],"answer":1},{"q":"Which two nerves arise directly from the trunks of the brachial plexus?","options":["Dorsal scapular nerve and Long thoracic nerve","Suprascapular nerve and Nerve to subclavius","Upper and lower subscapular nerves","Thoraco-dorsal nerve and Axillary nerve"],"answer":1},{"q":"What are the branches arising from the roots and trunks of the brachial plexus collectively called?","options":["Infraclavicular branches","Supraclavicular branches","Axillary branches","Pectoral branches"],"answer":1},{"q":"Which of the following is a branch of the lateral cord of the brachial plexus?","options":["Medial pectoral nerve","Musculocutaneous nerve","Ulnar nerve","Radial nerve"],"answer":1},{"q":"Which of the following nerves arises from the medial cord of the brachial plexus?","options":["Lateral root of the median nerve","Axillary nerve","Ulnar nerve","Upper subscapular nerve"],"answer":2},{"q":"What are the root origins of the medial pectoral nerve?","options":["C5, C6, C7","C7, C8, T1","C8 and T1","C5 and C6"],"answer":2},{"q":"Which of the following nerves is a branch of the posterior cord?","options":["Thoraco-dorsal nerve","Musculocutaneous nerve","Ulnar nerve","Medial cutaneous nerve of the arm"],"answer":0},{"q":"Erb's point is a region on the upper trunk of the brachial plexus where how many nerves meet?","options":["Four","Five","Six","Seven"],"answer":2},{"q":"Which of the following is NOT one of the nerves that meet at Erb's point?","options":["C5 root","Suprascapular nerve","Long thoracic nerve","Anterior division of the upper trunk"],"answer":2},{"q":"What is the most common mechanism causing Erb's paralysis?","options":["Hyperabduction of the arm","An excessive increase in the angle between the head and shoulder","Direct penetrating trauma to the axilla","Compression of the median nerve at the wrist"],"answer":1},{"q":"Which specific nerve roots are primarily involved in Erb's paralysis?","options":["C5 and C6","C7 alone","C8 and T1","C5, C6, C7, C8, and T1"],"answer":0},{"q":"The characteristic deformity seen in Erb's paralysis is commonly known as what?","options":["Claw hand","Wrist drop","Waiter's tip hand","Ape hand"],"answer":2},{"q":"In Erb's paralysis, why is the arm characteristically adducted?","options":["Due to paralysis of the deltoid muscle","Due to paralysis of the supraspinatus, infraspinatus, and teres minor","Due to paralysis of the biceps brachii","Due to overactivity of the latissimus dorsi"],"answer":0},{"q":"What mechanism of injury typically causes Klumpke's paralysis?","options":["Excessive lateral flexion of the neck","Hyperabduction of the arm","Direct blow to the clavicle","A fall from the back of a horse landing directly on the shoulder"],"answer":1},{"q":"What is the characteristic hand deformity associated with Klumpke's paralysis?","options":["Waiter's tip hand","Policeman's tip hand","Claw hand","Swan neck deformity"],"answer":2},{"q":"Which syndrome may frequently accompany Klumpke's paralysis due to the involvement of T1 sympathetic fibers?","options":["Carpal tunnel syndrome","Horner's syndrome","Thoracic outlet syndrome","Cubital tunnel syndrome"],"answer":1},{"q":"In Klumpke's paralysis, where does the typical sensory loss occur?","options":["Along the outer aspect of the arm","Over the deltoid muscle","Along the medial border of the forearm and hand","On the dorsal surface of the thumb"],"answer":2},{"q":"During surgical excision of axillary lymph nodes approached through the floor of the axilla, which of the following structures is NOT listed in the text as being at risk?","options":["Intercostobrachial nerve","Long thoracic nerve","Musculocutaneous nerve","Thoraco-dorsal artery"],"answer":2},{"q":"Which of the following muscles is paralyzed in Erb's paralysis but NOT in Klumpke's paralysis?","options":["All intrinsic muscles of the hand","Flexors of the wrist","Flexors of the fingers","Biceps brachii"],"answer":3}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;

        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }

        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
