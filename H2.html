<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>
        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>
        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>
    <script>
        const quizData = [{"q":"According to the classification of connective tissues, which of the following is listed under specialized connective tissue alongside bone and blood, and is further subdivided into hyaline, elastic, and fibrocartilage?","options":["Loose connective tissue (areolar)","Dense irregular connective tissue","Cartilage","Reticular connective tissue"],"answer":2},{"q":"In cartilage, the only cells of the matrix that live in pockets called lacunae are:","options":["Fibroblasts","Chondrocytes","Osteocytes","Chondroblasts"],"answer":1},{"q":"Cartilage is avascular because its chondrocytes secrete:","options":["An angiogenesis factor","An antiangiogenesis factor (used as a cancer treatment drug)","A high concentration of hyaluronic acid","Reticular fibers"],"answer":1},{"q":"Cartilage is slow to heal primarily because it is:","options":["Highly vascularized","Avascular","Composed mainly of elastic fibers","Rich in rapidly dividing chondrocytes"],"answer":1},{"q":"Cartilage is located in all of the following sites EXCEPT:","options":["Ear and nose","Respiratory system (trachea, bronchi)","Movable joints and costal cartilages","Diaphysis of long bones"],"answer":3},{"q":"Which form of cartilage is the most common, contains a large amount of type II collagen, and is found in the trachea and costal cartilages?","options":["Elastic cartilage","Fibrocartilage","Hyaline cartilage","Reticular cartilage"],"answer":2},{"q":"In the absence of perichondrium, articular cartilage receives its nutrients from:","options":["Blood vessels within the cartilage matrix","Lymphatic vessels","Synovial fluid","Perichondrial vasculature"],"answer":2},{"q":"The perichondrium surrounding cartilage (except articular cartilage) is a sheath of:","options":["Dense regular connective tissue","Loose areolar connective tissue","Dense irregular connective tissue containing vasculature","Fibrocartilage"],"answer":2},{"q":"In the embryo, hyaline cartilage functions as:","options":["A permanent skeleton","A template (model) for subsequent replacement by bone","A site of hematopoiesis","A shock absorber only in joints"],"answer":1},{"q":"Hyaline cartilage is found in all of the following locations EXCEPT:","options":["Joint surfaces","Trachea and costal cartilages","Nose and larynx","External ear (auricle)"],"answer":3},{"q":"In hyaline cartilage, the territorial matrix immediately adjacent to chondrocytes stains darker than the interterritorial matrix because it contains higher amounts of:","options":["Type I collagen fibers","Glycosaminoglycans","Elastic fibers","Reticular fibers"],"answer":1},{"q":"Perichondrium is absent around:","options":["Elastic cartilage of the epiglottis","Fibrocartilage of intervertebral discs","Articular (joint) hyaline cartilage","Costal hyaline cartilage"],"answer":2},{"q":"In hyaline cartilage, deeper chondrocytes that may occur in groups of up to 8 cells are referred to as:","options":["Isogenous groups","Territorial clusters","Perichondrial fibroblasts","Chondroblast nests"],"answer":0},{"q":"Elastic cartilage is characteristically located in the:","options":["Intervertebral discs and menisci","Auricle of the ear, external auditory canal, eustachian tube, and epiglottis","Costal cartilages and epiphyseal plates","Pubic symphysis"],"answer":1},{"q":"Fibrocartilage is unique among cartilage types because it:","options":["Contains abundant elastic fibers","Lacks perichondrium","Has a blue-white appearance","Is surrounded by dense irregular connective tissue"],"answer":1},{"q":"Histologically, fibrocartilage is characterized by:","options":["A network of fine type II collagen fibers","Bundles of type I collagen fibers arranged in rows","Abundant elastic fibers throughout the matrix","Isogenous groups of chondrocytes in lacunae only"],"answer":1},{"q":"The annulus fibrosus of the intervertebral disc is composed of:","options":["Hyaline cartilage","Elastic cartilage","Fibrocartilage arranged in overlapping layers in a 90-degree pattern","Nucleus pulposus gel"],"answer":2},{"q":"Herniation of an intervertebral disc typically results from:","options":["Rupture of the nucleus pulposus alone","Rupture of the annulus fibrosus with expulsion of the nucleus pulposus","Degeneration of the perichondrium","Excessive interstitial growth"],"answer":1},{"q":"Interstitial growth of cartilage occurs through:","options":["Differentiation of new chondrocytes from perichondrial stem cells at the surface","Mitotic division of existing chondrocytes within the cartilage and production of new matrix","Apposition of matrix from synovial fluid","Invasion by blood vessels from the perichondrium"],"answer":1},{"q":"In adults, cartilage does not grow further primarily because:","options":["Chondrocytes retain mitotic ability but matrix production stops","No new chondrocytes are formed and there is no further cartilage growth","Perichondrium is lost after puberty","Interstitial growth continues indefinitely"],"answer":1},{"q":"The perichondrium is essential for cartilage growth and maintenance because it contains:","options":["Mature chondrocytes ready for matrix secretion","Many undifferentiated mesenchyme cells that can differentiate into new chondrocytes","Pre-formed elastic fibers only","Dense regular connective tissue bundles"],"answer":1},{"q":"In hyaline cartilage, the chondrocytes nearest the surface are typically:","options":["Round and arranged in isogenous groups","Elliptical, with their long axis parallel to the surface","Lined up in rows as seen in the epiphyseal plate","Shrunken and non-viable in histological sections"],"answer":1},{"q":"Chondrocytes within cartilage exhibit:","options":["High metabolic activity due to rich vascular supply","Low metabolic activity","No metabolic activity","Metabolic activity equal to that of osteoblasts"],"answer":1},{"q":"Fibrocartilage is characterized by a dense network of type I collagen fibers and is adapted for:","options":["Areas requiring high flexibility (e.g., external ear)","High stress and weight-bearing areas (e.g., intervertebral discs)","Embryonic skeletal templates","Respiratory tract support"],"answer":1},{"q":"The nucleus pulposus of the intervertebral disc consists of a gel-like matrix that is rich in:","options":["Chondroitin sulfate only","Hyaluronic acid","Type I collagen bundles","Elastic fibers"],"answer":1},{"q":"The ground substance of cartilage is a thick gel primarily composed of:","options":["Collagen and elastic fibers","Proteoglycans secreted by chondrocytes","Reticular fibers","Glycoproteins only"],"answer":1},{"q":"The extracellular matrix of cartilage contains:","options":["Hyaluronic acid, proteoglycans, and glycoproteins","Only type I collagen and no ground substance","Osteoid material","Hemopoietic elements"],"answer":0},{"q":"The primary functions of hyaline cartilage in locations such as joint surfaces, the nose, larynx, trachea, and between ribs and sternum are:","options":["Support and protection","High tensile strength under extreme weight-bearing","Elastic recoil only","Blood cell production"],"answer":0},{"q":"The antiangiogenesis factor secreted by chondrocytes (responsible for cartilage avascularity) is clinically relevant as a:","options":["Treatment for bacterial infections","Cancer treatment drug","Agent for bone fracture healing","Stimulant for muscle regeneration"],"answer":1},{"q":"The most abundant type of cartilage in the adult human body is:","options":["Elastic cartilage","Fibrocartilage","Hyaline cartilage","Articular fibrocartilage"],"answer":2}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;
        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }
        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }
        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }
        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }
        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }
        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
