<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>

        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [{"q":"What are the alternative names for the adductor canal?","options":["Femoral canal or Sartorial tunnel","Subsartorial canal or Hunter's canal","Popliteal canal or Medial tunnel","Inguinal canal or Pectineal canal"],"answer":1},{"q":"Where exactly is the adductor canal located in the thigh?","options":["Lateral side of the upper one-third","Medial side of the middle one-third","Posterior side of the lower one-third","Anterior side of the upper one-third"],"answer":1},{"q":"The adductor canal extends from the apex of the femoral triangle to which structure?","options":["The inguinal ligament","The tibial tuberosity","The tendinous opening in the adductor magnus","The base of the patella"],"answer":2},{"q":"What is the primary function of the adductor canal?","options":["To house the sciatic nerve","To provide a passage for femoral vessels to reach the popliteal fossa","To protect the lymph nodes of the thigh","To anchor the sartorius muscle to the femur"],"answer":1},{"q":"What is the approximate proximodistal extent of the adductor canal?","options":["5 cm","10 cm","15 cm","25 cm"],"answer":2},{"q":"Which muscle forms the anterolateral boundary of the adductor canal?","options":["Adductor longus","Vastus medialis","Sartorius","Rectus femoris"],"answer":1},{"q":"Which muscle forms the posterior boundary (floor) of the canal in its upper part?","options":["Adductor magnus","Adductor brevis","Adductor longus","Pectineus"],"answer":2},{"q":"The roof (anteromedial wall) of the adductor canal is formed by a fibrous membrane and overlapped by which muscle?","options":["Gracilis","Vastus lateralis","Sartorius","Tensor fasciae latae"],"answer":2},{"q":"Which of the following are the primary \"two vessels\" contained within the canal?","options":["Great saphenous vein and Femoral artery","Femoral artery and Femoral vein","Profunda femoris artery and vein","Popliteal artery and vein"],"answer":1},{"q":"Which nerve is NOT listed as a primary content of the adductor canal?","options":["Saphenous nerve","Nerve to vastus medialis","Sciatic nerve","Posterior division of the obturator nerve"],"answer":2},{"q":"Which specific branch of the femoral artery is found within the adductor canal?","options":["Lateral circumflex femoral artery","Descending genicular artery","Medial circumflex femoral artery","Superior gluteal artery"],"answer":1},{"q":"Through which structure does the femoral artery leave the adductor canal?","options":["Saphenous opening","Obturator canal","Adductor hiatus","Femoral ring"],"answer":2},{"q":"What is the spatial relationship of the femoral vein to the artery in the upper part of the canal?","options":["Anterior","Lateral","Posterior","Medial"],"answer":2},{"q":"Which of the following describes the saphenous nerve?","options":["Shortest motor nerve of the thigh","Longest cutaneous nerve of the body","Branch of the obturator nerve","Main nerve supply to the adductor magnus"],"answer":1},{"q":"How does the saphenous nerve relate to the femoral artery as it travels through the canal?","options":["It remains lateral throughout","It crosses from lateral, to anterior, then to medial","It crosses from medial to lateral","It lies posterior to the artery at all times"],"answer":1},{"q":"Where does the saphenous nerve leave the adductor canal?","options":["Through the adductor hiatus with the artery","By piercing the fibrous membrane proximal to the adductor opening","At the apex of the femoral triangle","Through the nutrient foramen of the femur"],"answer":1},{"q":"Which branch of the saphenous nerve joins the patellar plexus?","options":["Medial sural nerve","Infrapatellar branch","Nerve to vastus medialis","Descending genicular branch"],"answer":1},{"q":"The saphenous nerve arises from the femoral nerve in which anatomical region?","options":["Adductor canal","Popliteal fossa","Femoral triangle","Gluteal region"],"answer":2},{"q":"Where does the saphenous nerve become subcutaneous?","options":["Lateral aspect of the thigh","Medial aspect of the knee, between sartorius and gracilis","Posterior aspect of the calf","Anterior to the patella"],"answer":1},{"q":"Which area of skin is NOT supplied by the saphenous nerve?","options":["Medial aspect of the knee","Medial aspect of the foot","Lateral aspect of the leg","Medial aspect of the leg"],"answer":2},{"q":"What is the defining characteristic of the nerve to vastus medialis?","options":["It is a branch of the obturator nerve","It is the thickest muscular branch of the femoral nerve","It leaves the canal through the adductor hiatus","It is a purely cutaneous nerve"],"answer":1},{"q":"Which structure is the first to leave the adductor canal?","options":["Saphenous nerve","Femoral artery","Nerve to vastus medialis","Femoral vein"],"answer":2},{"q":"The subsartorial plexus of nerves supplies the skin of which region?","options":["Lateral thigh","Medial thigh","Posterior leg","Anterior knee"],"answer":1},{"q":"Where does the anterior division of the obturator nerve descend relative to the pectineus?","options":["In front of it","Behind it","Lateral to it","Medial to it"],"answer":1},{"q":"Which nerve ends by supplying the knee joint after running on the adductor magnus?","options":["Saphenous nerve","Nerve to vastus medialis","Posterior division of the obturator nerve","Anterior division of the obturator nerve"],"answer":2},{"q":"Why is the femoral artery ligated in the adductor canal for popliteal aneurysms?","options":["It is more superficial there","The artery is healthier and less likely to tear than in the popliteal fossa","To prevent damage to the sciatic nerve","Because the saphenous nerve provides better visualization"],"answer":1},{"q":"What is the cross-sectional shape of the adductor canal?","options":["Circular","Square","Triangular","Oval"],"answer":2},{"q":"Which artery arises from the femoral artery just before it leaves the canal?","options":["Profunda femoris","Descending genicular artery","Popliteal artery","Obturator artery"],"answer":1},{"q":"The saphenous nerve enters the foot by passing:","options":["Posterior to the medial malleolus","Anterior to the ankle","Through the tarsal tunnel","Lateral to the Achilles tendon"],"answer":1},{"q":"In the lower part of the adductor canal, the femoral vein is situated:","options":["Medial to the artery","Posterolateral to the artery","Anterior to the artery","Lateral to the artery"],"answer":1}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;

        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }

        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
