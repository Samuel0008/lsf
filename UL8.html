<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>

        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [{"q":"Which bones articulate to form the cubital articulations in the elbow region?","options":["Humerus and Ulna only","Humerus and Radius only","Humerus, Radius, and Ulna","Radius and Ulna only"],"answer":2},{"q":"On the surface of the arm, where is the joint line of the elbow situated?","options":["1 cm above the line joining the two epicondyles","2 cm below the line joining the two epicondyles","Directly on the line joining the two epicondyles","5 cm below the medial epicondyle"],"answer":1},{"q":"What specific type of synovial joint is the elbow joint?","options":["Ball and socket","Pivot","Hinge","Saddle"],"answer":2},{"q":"Which bony landmark is described as a rounded hemispherical eminence with a smooth articular surface on its anterior and inferior aspects?","options":["Trochlea","Medial epicondyle","Olecranon process","Capitulum"],"answer":3},{"q":"The trochlear notch of the ulna is formed by which two bony surfaces?","options":["Coronoid process and olecranon process","Head of radius and coronoid process","Radial notch and olecranon process","Styloid process and trochlea"],"answer":0},{"q":"Regarding the capsular ligament of the elbow, which of the following is true?","options":["It is attached to the neck of the radius","It is NOT attached to the radius","It is thicker on the anterior and posterior sides","It excludes the olecranon fossa"],"answer":1},{"q":"Why is the joint capsule of the elbow thinner on its anterior and posterior aspects?","options":["To protect the brachial artery","To facilitate flexion and extension","To allow for rotation of the radius","To accommodate the ulnar nerve"],"answer":1},{"q":"Which band of the medial (ulnar collateral) ligament is noted for being the strongest and stiffest?","options":["Posterior band","Inferior band","Oblique band","Anterior band"],"answer":3},{"q":"Where does the apex of the triangular medial ligament attach?","options":["Lateral epicondyle","Medial epicondyle","Coronoid process","Olecranon process"],"answer":1},{"q":"The lateral ligament of the elbow extends from the lateral epicondyle and blends with which structure?","options":["Oblique cord","Quadrate ligament","Annular ligament","Interosseous membrane"],"answer":2},{"q":"Which muscle is a direct anterior relation to the elbow joint and separates other structures from the capsule?","options":["Biceps brachii","Triceps brachii","Brachialis","Anconeus"],"answer":2},{"q":"Which nerve is located posteromedially in relation to the elbow joint?","options":["Median nerve","Radial nerve","Musculocutaneous nerve","Ulnar nerve"],"answer":3},{"q":"Which bursa is located between the skin and the subcutaneous triangular area of the olecranon?","options":["Subtendinous olecranon bursa","Subcutaneous olecranon bursa","Bicipitoradial bursa","Brachialis bursa"],"answer":1},{"q":"Which bursa separates the biceps tendon from the smooth anterior part of the radial tuberosity?","options":["Subcutaneous olecranon bursa","Subtendinous olecranon bursa","Bicipitoradial bursa","Coronoid bursa"],"answer":2},{"q":"What anatomical feature primarily provides the structural stability of the elbow joint?","options":["The strength of the biceps tendon","The fit of the trochlea into the trochlear notch","The thickness of the anterior capsule","The presence of fat pads"],"answer":1},{"q":"Which of the following arteries does NOT contribute to the anastomosis around the elbow?","options":["Profunda brachii artery","Superior ulnar collateral artery","Axillary artery","Radial recurrent artery"],"answer":2},{"q":"The radial nerve provides articular branches to the elbow joint through its branch to which muscle?","options":["Brachialis","Anconeus","Flexor carpi ulnaris","Supinator"],"answer":1},{"q":"Which muscle pair is responsible for extension at the elbow joint?","options":["Biceps and Brachialis","Brachialis and Brachioradialis","Triceps and Anconeus","Pronator teres and Supinator"],"answer":2},{"q":"Why does joint effusion (swelling) in the elbow typically present as a posterior distension?","options":["Because the anterior capsule is thickest","Because the posterior capsule and covering fascia are thin","Because of the presence of the ulnar nerve","Because the olecranon process pushes fluid forward"],"answer":1},{"q":"What is the recommended site for aspirating the elbow joint?","options":["Medial side, below the epicondyle","Anterior side, through the brachialis","Posterolateral side, above the head of the radius","Directly through the olecranon process"],"answer":2},{"q":"Posterior dislocations of the elbow are often associated with a fracture of which bony part?","options":["Radial styloid","Medial epicondyle","Coronoid process","Surgical neck of humerus"],"answer":2},{"q":"In a normal flexed elbow, what shape is formed by the two epicondyles and the tip of the olecranon?","options":["Straight line","Isosceles triangle","Equilateral triangle","Right-angle triangle"],"answer":2},{"q":"\"Nursemaid’s elbow\" (pulled elbow) typically occurs in which age group?","options":["Newborns","1-3 years old","10-15 years old","Elderly adults"],"answer":1},{"q":"What anatomical event occurs during a \"pulled elbow\" injury?","options":["Fracture of the humerus","Head of the radius comes out of the annular ligament","Ulnar nerve is compressed","Complete tear of the medial ligament"],"answer":1},{"q":"Which movement causes severe pain in a child with a pulled elbow?","options":["Flexion","Extension","Supination","Pronation"],"answer":2},{"q":"Tennis elbow is a clinical condition characterized by pain over which structure?","options":["Medial epicondyle","Lateral epicondyle","Olecranon process","Radial tuberosity"],"answer":1},{"q":"Which of the following is a potential cause of Tennis elbow?","options":["Strain of the common flexor origin","Tear of the extensor carpi radialis brevis","Ulnar nerve entrapment","Inflammation of the bicipitoradial bursa"],"answer":1},{"q":"Golfer's elbow is caused by repetitive use of which muscles?","options":["Extensors of the forearm","Superficial flexors of the forearm","Triceps brachii","Supinator"],"answer":1},{"q":"\"Student's elbow\" (Miner's elbow) is caused by the inflammation of which specific bursa?","options":["Subtendinous olecranon bursa","Subcutaneous olecranon bursa","Bicipitoradial bursa","Brachialis bursa"],"answer":1},{"q":"Which of these is NOT listed as a common nerve entrapment around the elbow?","options":["Median nerve entrapment","Ulnar nerve entrapment","Axillary nerve entrapment","Posterior interosseous nerve entrapment"],"answer":2}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;

        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }

        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
