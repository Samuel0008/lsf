<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>
        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>
        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>
    <script>
        const quizData = [{"q":"At which stage is the primary oocyte arrested before birth?","options":["Prophase I","Metaphase I","Prophase II","Metaphase II"],"answer":0},{"q":"Which cell resumes development at puberty to complete the first meiotic division?","options":["Oogonium","Primary oocyte","Secondary oocyte","Ovum"],"answer":1},{"q":"Prior to fertilization, the secondary oocyte is arrested at which stage of cellular division?","options":["Prophase I","Metaphase I","Prophase II","Metaphase II"],"answer":3},{"q":"What is the ultimate fate of the three polar bodies formed during meiotic division of the oocyte?","options":["They fuse to form the trophoblast","They disintegrate because they lack cytoplasm","They provide nutrition to the developing embryo","They become part of the inner cell mass"],"answer":1},{"q":"Which structure is responsible for sweeping the ovum into the infundibulum of the uterine tube at ovulation?","options":["Ampulla","Isthmus","Cilia of the endometrium","Finger-like fimbriae"],"answer":3},{"q":"What is the most common anatomical site for fertilization to take place?","options":["Isthmus of the uterine tube","Ampulla of the uterine tube","Fundus of the uterus","Infundibulum of the uterine tube"],"answer":1},{"q":"How does the sperm successfully penetrate the zona pellucida during fertilization?","options":["Through rapid flagellar propulsion alone","By utilizing basic secretions from the corona radiata","Through acidic substances secreted by its acrosome","By phagocytosis of the zona pellucida cells"],"answer":2},{"q":"What immediate reaction occurs in the oocyte following initial sperm contact to inhibit the entry of additional sperms?","options":["Expulsion of the first polar body","Disintegration of the corona radiata","Changes in the zona pellucida","Contraction of the uterine tube"],"answer":2},{"q":"What specifically triggers the secondary oocyte to complete the second meiotic division?","options":["The sweeping action of the fimbriae","The entry of the sperm into the oocyte","The fusion of the male and female pronuclei","The shedding of the zona pellucida"],"answer":1},{"q":"After the sperm enters the cytoplasm of the oocyte, what happens to its structure?","options":["The tail enlarges and the head degenerates","Both the head and tail fuse with the mitochondria","The tail degenerates and the head enlarges to form the male pronucleus","It remains unchanged until the first mitotic division"],"answer":2},{"q":"At what point is the process of fertilization officially considered complete?","options":["When the sperm penetrates the corona radiata","When the male pronucleus forms","When the maternal and paternal chromosomes intermingle at metaphase of the first mitotic division","When the zygote reaches the two-cell stage"],"answer":2},{"q":"What term is used to describe the rapid mitotic cell divisions that the single-cell zygote undergoes as it passes down the uterine tube?","options":["Implantation","Cleavage","Gastrulation","Meiosis"],"answer":1},{"q":"Approximately how long after fertilization does the zygote divide into the two-cell stage?","options":["12 hours","30 hours","3 days","5 days"],"answer":1},{"q":"The daughter cells formed during the early cleavage stages of the zygote are referred to as:","options":["Oocytes","Trophoblasts","Blastomeres","Embryoblasts"],"answer":2},{"q":"Approximately 3 days after fertilization, the developing organism consists of a solid mass of 16 cells known as the:","options":["Blastocyst","Morula","Gastrula","Zygote"],"answer":1},{"q":"What drives the conversion of the morula into a blastocyst?","options":["The degeneration of the trophoblast layer","Fluid from the uterine cavity occupying intercellular spaces","The shedding of the zona pellucida","The fusion of blastomeres into a single giant cell"],"answer":1},{"q":"Which cells of the blastocyst are responsible for forming part of the placenta and providing nutrition?","options":["The inner cell mass","The embryoblast","The trophoblast","The blastomeres"],"answer":2},{"q":"What is another term for the inner cell mass of the blastocyst?","options":["Trophoblast","Embryoblast","Corona radiata","Blastomere"],"answer":1},{"q":"Before the blastocyst can attach to the endometrial epithelium, which structure must degenerate and disappear?","options":["Zona pellucida","Trophoblast","Blastocyst cavity","Corona radiata"],"answer":0},{"q":"At what time frame does the blastocyst typically attach to the endometrial epithelium?","options":["24 to 30 hours after fertilization","3 days after fertilization","5th to 6th day after fertilization","10 to 14 days after fertilization"],"answer":2},{"q":"Which of the following is the first of the three germ layers to be formed during the first week of uterine life?","options":["Ectoderm","Mesoderm","Endoderm","Neuroectoderm"],"answer":2},{"q":"Which clinical condition occurs when a fertilized egg implants outside of the uterus?","options":["Endometriosis","Ectopic pregnancy","Placenta previa","Molar pregnancy"],"answer":1},{"q":"Where is the most common anatomical location for an ectopic pregnancy to occur?","options":["Cervix","Ovary","Fallopian tube","Abdominal cavity"],"answer":2},{"q":"Based on the provided clinical data, what specific segment of the fallopian tube accounts for approximately 70% of ectopic pregnancies?","options":["Ampullary","Isthmic","Fimbrial","Interstitial"],"answer":0},{"q":"Which of the following is a commonly reported symptom of an ectopic pregnancy?","options":["High-grade fever","One-sided abdominal pain and shoulder pain","Profuse watery vaginal discharge","Painless bright red vaginal bleeding"],"answer":1},{"q":"During fertilization, after penetrating the corona radiata, what is the next distinct layer the sperm must penetrate?","options":["Plasma membrane of the oocyte","Zona pellucida","Theca interna","Perivitelline space"],"answer":1},{"q":"What occurs when the male and female pronuclei meet in the center of the oocyte?","options":["They divide immediately by meiosis","They form a new protective zona pellucida","They lose their nuclear membranes","They expel a third polar body"],"answer":2},{"q":"Which of the following represents the correct order of early embryonic development stages?","options":["Zygote -> Blastocyst -> Morula","Morula -> Zygote -> Blastocyst","Zygote -> Morula -> Blastocyst","Blastocyst -> Zygote -> Morula"],"answer":2},{"q":"What percentage of tubal ectopic pregnancies occur in the isthmic portion of the fallopian tube?","options":["2-3%","11%","12%","70%"],"answer":2},{"q":"What is the chromosomal ploidy of a primary oocyte before it completes the first meiotic division?","options":["Diploid (2n)","Haploid (n)","Triploid (3n)","Tetraploid (4n)"],"answer":0}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;
        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }
        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }
        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }
        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }
        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }
        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
