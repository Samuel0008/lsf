<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>

        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>

    <script>
        const quizData = [{"q":"How are the carpal bones shaped on their flexor surface?","options":["Convex","Deeply concave","Flat","Irregularly pointed"],"answer":1},{"q":"Which structure converts the bony gutter of the carpal bones into the carpal tunnel?","options":["Extensor retinaculum","Palmar aponeurosis","Flexor retinaculum","Transverse metacarpal ligament"],"answer":2},{"q":"What is the arrangement of the four tendons of the flexor digitorum superficialis in the carpal tunnel?","options":["All in a single horizontal row","Two rows, with index and little finger tendons in front","Two rows, with middle and ring finger tendons in front","A vertical column deep to the profundus tendons"],"answer":2},{"q":"Regarding the flexor digitorum profundus, which finger's tendon is separate from the others within the tunnel?","options":["Middle finger","Little finger","Ring finger","Index finger"],"answer":3},{"q":"Where do the tendons of the flexor digitorum profundus lie within the carpal tunnel?","options":["Superficial to the flexor retinaculum","All on the same plane deep on the carpal bones","In two distinct layers of two tendons each","Lateral to the median nerve"],"answer":1},{"q":"What is a characteristic of the common synovial sheath shared by the flexor tendons?","options":["It completely invests all eight tendons","It only surrounds the superficialis tendons","It does not invest the tendons completely","It is located superficial to the flexor retinaculum"],"answer":2},{"q":"From which side is the common synovial sheath reflected?","options":["Ulnar side","Radial side","Posterior side","Anterior side"],"answer":1},{"q":"Why does the carpal tunnel have little capacity to increase in size?","options":["The median nerve occupies the entire space","Its boundaries are very rigid","The carpal bones are flexible","The flexor retinaculum is highly elastic"],"answer":1},{"q":"Which tendon lies in its own synovial sheath as it passes through the tunnel beside the trapezius?","options":["Flexor carpi radialis","Flexor digitorum profundus","Flexor pollicis longus","Palmaris longus"],"answer":2},{"q":"What is the position of the median nerve as it passes through the carpal tunnel?","options":["Medial to the flexor digitorum superficialis","Beneath the flexor retinaculum on the lateral side of the flexor digitorum superficialis","Deep to the flexor digitorum profundus","Superficial to the flexor retinaculum"],"answer":1},{"q":"What specific condition is noted as a cause for median nerve compression within the crowded tunnel?","options":["Bony spurs on the phalanges","Long continued swelling in the synovial sheaths","Shortening of the flexor retinaculum","Atrophy of the carpal bones"],"answer":1},{"q":"Which muscular symptom is associated with Carpal Tunnel Syndrome?","options":["Wasting and weakness of the thenar muscles","Hypertrophy of the hypothenar muscles","Spasms in the lumbricals","Paralysis of the flexor carpi ulnaris"],"answer":0},{"q":"How is thumb functionality specifically affected in Carpal Tunnel Syndrome?","options":["Loss of power of adduction","Loss of power of opposition","Inability to extend the distal phalanx","Hyperflexion of the thumb"],"answer":1},{"q":"Where does anaesthesia typically occur in Carpal Tunnel Syndrome?","options":["Over the entire palm and dorsum of the hand","Over the little finger and half of the ring finger","Over three and a half digits on the thumb side","Only on the wrist crease"],"answer":2},{"q":"Which of these sensations is NOT listed as a common symptom of Carpal Tunnel Syndrome?","options":["Numbness","Tingling","Coldness and shivering","Burning and pain"],"answer":2},{"q":"Shock-like sensations in Carpal Tunnel Syndrome typically radiate to which fingers?","options":["Little and ring fingers","Thumb, index, middle, and ring fingers","Index and middle fingers only","All five digits equally"],"answer":1},{"q":"How far can the pain or tingling of Carpal Tunnel Syndrome travel?","options":["It never leaves the wrist","Up the forearm toward the shoulder","Down to the fingertips only","To the contralateral hand"],"answer":1},{"q":"Why might a patient with Carpal Tunnel Syndrome have difficulty buttoning clothes?","options":["Tremors in the forearm","Weakness and clumsiness in the hand","Stiffness in the shoulder joint","Excess skin on the fingertips"],"answer":1},{"q":"What factor contributes to a patient frequently dropping things in this syndrome?","options":["Visual impairment","Loss of proprioception","Excessive sweat on the palms","Muscle hypertrophy"],"answer":1},{"q":"Why is there NO anaesthesia over the thenar eminence in Carpal Tunnel Syndrome?","options":["It is supplied by the ulnar nerve","It is supplied by the palmar branch of the median nerve which passes superficial to the tunnel","It is supplied by the radial nerve","The skin there is too thick to lose sensation"],"answer":1},{"q":"Clinical diagnosis must distinguish Carpal Tunnel Syndrome from what other condition?","options":["Ulnar nerve entrapment at the elbow","Median nerve damage at a higher level","Radial nerve palsy","Brachial plexus avulsion"],"answer":1},{"q":"If median nerve damage occurs at a higher level, what additional branch is affected compared to CTS?","options":["Recurrent branch","Palmar cutaneous branch","Deep branch of the ulnar nerve","Posterior interosseous nerve"],"answer":1},{"q":"Which finding suggests nerve damage at a level higher than the carpal tunnel?","options":["Intact flexion of the terminal phalanx of the thumb","Weakening of the relevant flexor muscles in the forearm","Numbness in the little finger","Increased strength in the thenar muscles"],"answer":1},{"q":"Regarding the terminal phalanx of the thumb, what is true for a Carpal Tunnel Syndrome patient?","options":["It cannot be flexed","It can be flexed with normal power","It can only be extended","It is permanently locked in flexion"],"answer":1},{"q":"Why is heredity considered a risk factor for Carpal Tunnel Syndrome?","options":["It is a contagious condition","Some families may have smaller carpal tunnels or anatomic differences","It only affects people of specific heights","It is linked to genetic muscle hypertrophy"],"answer":1},{"q":"How does repetitive hand use contribute to nerve pressure?","options":["It causes the carpal bones to grow larger","It aggravates tendons, causing swelling that puts pressure on the nerve","It thins the flexor retinaculum","It increases blood flow, which shrinks the nerve"],"answer":1},{"q":"Which wrist positions increase pressure on the median nerve?","options":["Neutral position","Extreme flexion or extension","Slight abduction","Constant rotation"],"answer":1},{"q":"Why can pregnancy trigger symptoms of Carpal Tunnel Syndrome?","options":["Increased calcium intake","Hormonal changes causing swelling","Weight gain in the fingers","Increased use of the hands"],"answer":1},{"q":"Which of the following health conditions is associated with Carpal Tunnel Syndrome?","options":["Hypotension","Diabetes","Myopia","Osteoporosis"],"answer":1},{"q":"Besides diabetes and rheumatoid arthritis, which condition is mentioned as a risk factor?","options":["Liver cirrhosis","Thyroid gland imbalance","Asthma","Vitamin C deficiency"],"answer":1}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;

        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }

        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
