<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LSF - Rapid MCQ</title>
    <style>
            :root { --bg-color: #050505; --box-bg: #0a244a; --box-hover: #0e356b; --text-color: #e0e6ed; --accent: #4fa8fb; --danger: #ff4a4a; --success: #4aff80; }
            body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
            #app { width: 100%; max-width: 800px; padding: 2rem; }
            .box { background: var(--box-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a3c6b; }
            button { background: var(--bg-color); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
            button:hover { background: var(--accent); color: var(--bg-color); }
            input[type="text"] { background: #031021; border: 1px solid var(--accent); color: #fff; padding: 10px; border-radius: 6px; width: calc(100% - 24px); margin-bottom: 15px;}
            .header-info { display: flex; justify-content: space-between; color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
            .trophy-container { position: relative; display: inline-block; text-align: center; margin-top: 20px;}
            .trophy-container img { max-width: 250px; border-radius: 12px; }
            .trophy-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; cursor: pointer; user-select: none;}
            .hidden-score { opacity: 0; }
            .review-item { padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; background: rgba(0,0,0,0.2); }
            .review-item.correct { border-left-color: var(--success); }
            .review-item.incorrect { border-left-color: var(--danger); }
        
        .option { display: block; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(255,255,255,0.1); }
        .option input { margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="box text-center">
            <h1>Rapid MCQ (30 Questions)</h1>
            <input type="text" id="student-name" placeholder="Enter your name (Optional)">
            <button onclick="startQuiz()">Start Quiz (10 Mins)</button>
        </div>
        <div id="quiz-screen" style="display:none;">
            <div class="header-info">
                <span id="timer">10:00</span>
                <span id="progress">0 / 30 Answered</span>
            </div>
            <div id="q-container"></div>
            <button onclick="submitQuiz()" style="width: 100%; margin-top: 20px;">Submit Quiz Now</button>
        </div>
        <div id="result-screen" class="box" style="display:none; text-align: center;">
            <h1 id="result-title"></h1>
            <p id="result-name"></p>
            <div class="trophy-container">
                <img src="trophy.png" alt="Trophy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEyNDRhIi8+PHRleHQgeD0iNTAiIHk9IjUwIiBmb250LXNpemU9IjEyIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg=='" />
                <div class="trophy-score" id="trophy-score" onclick="this.classList.toggle('hidden-score')" title="Click to hide/show score">100%</div>
            </div>
            <p><small>(Click the score on the image to hide/show it for screenshots!)</small></p>
            <h3 style="margin-top: 30px; text-align: left;">Review:</h3>
            <div id="review-container" style="text-align: left;"></div>
            <button onclick="restartQuiz()" style="margin-top: 20px;">Restart</button>
        </div>
    </div>
    <script>
        const quizData = [{"q":"In which anatomical structure does fertilization typically occur before the zygote migrates?","options":["Uterus","Fallopian tube","Ovary","Cervix"],"answer":1},{"q":"During migration, cleavages take place in the zygote to form which of the following structures before reaching the uterus?","options":["Epiblast","Blastocyst","Morula","Embryonic disc"],"answer":2},{"q":"Approximately how many days after fertilization does the conceptus typically reach the uterus?","options":["1-2 days","3-4 days","5-6 days","8-9 days"],"answer":2},{"q":"What term describes the process where the blastocyst breaks free from its protective outer layer, the zona pellucida?","options":["Apposition","Hatching","Compaction","Cavitation"],"answer":1},{"q":"What is the name of the initial, weak contact phase of blastocyst attachment to the endometrium?","options":["Adhesion","Invasion","Apposition","Decidualization"],"answer":2},{"q":"Which stage of human embryo implantation is characterized by strong binding to the uterine lining?","options":["Adhesion","Apposition","Hatching","Invasion"],"answer":0},{"q":"Burrowing of the embryo into the endometrium is referred to as which stage of implantation?","options":["Apposition","Adhesion","Compaction","Invasion"],"answer":3},{"q":"At stage 5 of development, which of the following structures has NOT yet started developing?","options":["Syncytiotrophoblast","Chorionic villi","Cytotrophoblast","Amniotic cavity"],"answer":1},{"q":"On what day does the invasion of the endometrium begin?","options":["Day 4","Day 5","Day 7","Day 12"],"answer":2},{"q":"At the start of endometrial invasion, the trophoblast differentiates into which two cell types?","options":["Epiblast and Hypoblast","Cytotrophoblast and Syncytiotrophoblast","Endoderm and Ectoderm","Somatic and Visceral mesoderm"],"answer":1},{"q":"Which trophoblast layer is actively erosive and invades the endometrial stroma?","options":["Cytotrophoblast","Hypoblast","Syncytiotrophoblast","Epiblast"],"answer":2},{"q":"The syncytiotrophoblast is described by all of the following characteristics EXCEPT being:","options":["Invasive","Ingestive","Digestive","Proliferative via mitosis"],"answer":3},{"q":"During the early part of stage 5, from where does the conceptus primarily derive its nourishment?","options":["Yolk sac","Maternal blood","Endometrial tissue","Amniotic fluid"],"answer":2},{"q":"Later in development, the conceptus transitions to obtaining nourishment directly from:","options":["Endometrial tissue","Maternal blood","The amniotic cavity","The blastocoelic cavity"],"answer":1},{"q":"By day 8, small spaces appearing between the inner cell mass and invading trophoblast coalesce to form what structure?","options":["Primitive yolk sac","Blastocoelic cavity","Amniotic cavity","Chorionic cavity"],"answer":2},{"q":"Concurrently with cavity formation, the inner cell mass undergoes morphological changes to form what structure?","options":["Trophectoderm","Flattened circular embryonic disc","Primary chorionic villi","Connecting stalk"],"answer":1},{"q":"Which of the following describes the cellular composition of the epiblast?","options":["High columnar cells","Cuboidal cells","Squamous cells","Pseudostratified ciliated cells"],"answer":0},{"q":"The epiblast is morphologically related to and forms the floor of which cavity?","options":["Blastocoelic cavity","Chorionic cavity","Amniotic cavity","Primitive yolk sac"],"answer":2},{"q":"Which of the following describes the cellular composition of the hypoblast?","options":["High columnar cells","Cuboidal cells","Spindle-shaped cells","Multinucleated giant cells"],"answer":1},{"q":"The cells of the hypoblast are adjacent to which structure?","options":["Amniotic cavity","Cytotrophoblast","Yolk sac","Connecting stalk"],"answer":2},{"q":"The hypoblast represents the embryonic origin of which germ layer?","options":["Embryonic ectoderm","Embryonic mesoderm","Embryonic endoderm","Neuroectoderm"],"answer":2},{"q":"During the 3rd week, the epiblast layer gives rise to which two embryonic layers?","options":["Endoderm and Ectoderm","Ectoderm and Mesoderm","Endoderm and Mesoderm","Cytotrophoblast and Syncytiotrophoblast"],"answer":1},{"q":"As the amniotic cavity enlarges, it acquires a thin epithelial roof (the amnion) which is probably derived from which cells?","options":["Syncytiotrophoblast","Hypoblast","Cytotrophoblastic cells","Extraembryonic mesoderm"],"answer":2},{"q":"The embryonic epiblast is continuous peripherally with which structure?","options":["Yolk sac","Heuser's membrane","Amnion","Chorion"],"answer":2},{"q":"Concurrently with the formation of the bilaminar disc, cells delineate from the cytotrophoblast to form a thin membrane known as:","options":["Prochordal plate","Exocoelomic (Heuser's) membrane","Amnion","Chorionic membrane"],"answer":1},{"q":"The exocoelomic (Heuser's) membrane extends around the inner wall of the blastocyst cavity to enclose which cavity?","options":["Amniotic cavity","Chorionic cavity","Primitive yolk sac","Extraembryonic coelom"],"answer":2},{"q":"Further delineation of trophoblastic cells gives rise to a layer of loosely arranged cells known as the:","options":["Extraembryonic mesoderm","Embryonic endoderm","Intraembryonic mesoderm","Syncytiotrophoblast"],"answer":0},{"q":"Where is the extraembryonic mesoderm located?","options":["Inside the amniotic cavity","Within the embryonic disc","Around the amniotic cavity and primitive yolk sac","Between the epiblast and hypoblast"],"answer":2},{"q":"What layer is specifically formed by the fusion and growth of cells that erode into the endometrial stroma to establish maternal blood communication?","options":["Cytotrophoblast","Hypoblast","Extraembryonic somatic mesoderm","Syncytiotrophoblast"],"answer":3},{"q":"By what mechanism does the blastocyst escape its protective outer layer prior to apposition?","options":["Apoptosis of the endometrium","Hatching from the zona pellucida","Invagination of the trophoblast","Formation of the exocoelomic membrane"],"answer":1}];
        const timeLimit = 600;
        let timerInt;
        let timeRemaining = timeLimit;
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        const STORAGE_KEY = `lsf_mcq_${simpleHash(JSON.stringify(quizData))}`;
        function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadState() {
            try { const str = localStorage.getItem(STORAGE_KEY); return str ? JSON.parse(str) : null; } catch(e) { return null; }
        }
        function restartQuiz() { localStorage.removeItem(STORAGE_KEY); location.reload(); }
        function startQuiz() {
            const nameInput = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'in-progress', studentName: nameInput, userAnswers: new Array(quizData.length).fill(-1), timeRemaining: timeLimit });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestions();
            timerInt = setInterval(() => {
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                const cur = loadState();
                if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
            }, 1000);
        }
        function renderQuestions() {
            const container = document.getElementById('q-container');
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div class="box" id="qbox-${i}"><p><strong>Q${i+1}:</strong> ${q.q}</p>`;
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option" onclick="updateProgress()"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }
        function updateProgress() {
            let answered = 0;
            quizData.forEach((_, i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) answered++; });
            document.getElementById('progress').innerText = `${answered} / ${quizData.length} Answered`;
            const saved = loadState();
            if (saved && saved.status === 'in-progress') {
                const userAnswers = new Array(quizData.length).fill(-1);
                quizData.forEach((_, i) => {
                    const sel = document.querySelector(`input[name="q${i}"]:checked`);
                    if (sel) userAnswers[i] = parseInt(sel.value);
                });
                saved.userAnswers = userAnswers;
                saveState(saved);
            }
        }
        function submitQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0;
            let reviewHtml = '';
            const userAnswers = new Array(quizData.length).fill(-1);
            quizData.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnsIdx = selected ? parseInt(selected.value) : -1;
                userAnswers[i] = userAnsIdx;
                const isCorrect = userAnsIdx === q.answer;
                if (isCorrect) score++;
                reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                    ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                </div>`;
            });
            const percent = Math.round((score / quizData.length) * 100);
            const sName = document.getElementById('student-name').value || 'Student';
            saveState({ status: 'completed', studentName: sName, userAnswers: userAnswers });
            document.getElementById('result-title').innerText = `Quiz Complete!`;
            document.getElementById('result-name').innerText = `Great effort, ${sName}`;
            document.getElementById('trophy-score').innerText = `${percent}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
        }
        function initializeQuiz() {
            const saved = loadState();
            if (!saved) return;
            document.getElementById('student-name').value = saved.studentName || '';
            if (saved.status === 'completed') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                let score = 0;
                let reviewHtml = '';
                quizData.forEach((q, i) => {
                    const userAnsIdx = saved.userAnswers[i];
                    const isCorrect = userAnsIdx === q.answer;
                    if (isCorrect) score++;
                    reviewHtml += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <p><strong>Q${i+1}:</strong> ${q.q}</p>
                        <p>Your Answer: <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnsIdx !== -1 ? q.options[userAnsIdx] : 'Skipped'}</span></p>
                        ${!isCorrect ? `<p>Correct Answer: <span style="color: var(--success)">${q.options[q.answer]}</span></p>` : ''}
                    </div>`;
                });
                const percent = Math.round((score / quizData.length) * 100);
                document.getElementById('result-title').innerText = `Quiz Complete!`;
                document.getElementById('result-name').innerText = `Great effort, ${saved.studentName}`;
                document.getElementById('trophy-score').innerText = `${percent}%`;
                document.getElementById('review-container').innerHTML = reviewHtml;
            } else if (saved.status === 'in-progress') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                timeRemaining = saved.timeRemaining || timeLimit;
                renderQuestions();
                saved.userAnswers.forEach((ansIdx, i) => {
                    if (ansIdx !== -1) {
                        const radio = document.querySelector(`input[name="q${i}"][value="${ansIdx}"]`);
                        if (radio) radio.checked = true;
                    }
                });
                updateProgress();
                timerInt = setInterval(() => {
                    timeRemaining--;
                    const m = Math.floor(timeRemaining / 60);
                    const s = timeRemaining % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 0) { clearInterval(timerInt); alert("Time's Up!"); submitQuiz(); }
                    const cur = loadState();
                    if (cur && cur.status === 'in-progress') { cur.timeRemaining = timeRemaining; saveState(cur); }
                }, 1000);
            }
        }
        initializeQuiz();
    </script>
</body>
</html>
